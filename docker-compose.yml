services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oogworld-frontend
    ports:
      - "4121:3000"
    restart: unless-stopped

  oogworld:
    build: .
    container_name: oogworld
    environment:
      # MediaMTX runs natively on Windows; point to its IP/hostname and port 8889 (WebRTC)
      # Example: STREAM_URL=http://192.168.1.100:8889/oogway (replace with your Windows IP)
      STREAM_URL: ${STREAM_URL:-http://localhost:8889/oogway}
      NTFY_TOPIC: ${NTFY_TOPIC:-your-unique-ntfy-topic}
      TZ: ${TZ:-UTC}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SUN_LAT: ${SUN_LAT:-40.7128}
      SUN_LNG: ${SUN_LNG:--74.0060}
      BEDTIME_SOON_MINUTES: ${BEDTIME_SOON_MINUTES:-90}
      ACTIVITY_LOG_PATH: ${ACTIVITY_LOG_PATH:-/app/activity_log.json}
      CHAT_LOG_PATH: ${CHAT_LOG_PATH:-/app/chat_log.json}
    ports:
      - "4120:4120"
    restart: unless-stopped
    # For local dev only (Portainer ignores this):
    # env_file:
    #   - .env
