services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: oogworld-mediamtx
    environment:
      MTX_HLS: "yes"
      MTX_HLSVARIANT: mpegts
      MTX_HLSSEGMENTCOUNT: "6"
      MTX_HLSSEGMENTDURATION: 0.5s
      MTX_HLSALWAYSREMUX: "yes"
      MTX_HLSALLOWORIGIN: "*"
      MTX_RTMP: "yes"
      MTX_RTSP: "yes"
      MTX_WEBRTC: "no"
      MTX_LOGLEVEL: info
    ports:
      - "1935:1935"   # RTMP — wall PC pushes here
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oogworld-frontend
    ports:
      - "4121:3000"
    restart: unless-stopped

  oogworld:
    build: .
    container_name: oogworld
    depends_on:
      - mediamtx
    environment:
      # MediaMTX runs as a Docker service; wall PC pushes RTMP to server port 1935.
      STREAM_URL: ${STREAM_URL:-http://mediamtx:8888/oogway}
      NTFY_TOPIC: ${NTFY_TOPIC:-your-unique-ntfy-topic}
      TZ: ${TZ:-UTC}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SUN_LAT: ${SUN_LAT:-40.7128}
      SUN_LNG: ${SUN_LNG:--74.0060}
      BEDTIME_SOON_MINUTES: ${BEDTIME_SOON_MINUTES:-90}
      ACTIVITY_LOG_PATH: ${ACTIVITY_LOG_PATH:-/app/activity_log.json}
      CHAT_LOG_PATH: ${CHAT_LOG_PATH:-/app/chat_log.json}
    ports:
      - "4120:4120"
    restart: unless-stopped
    # For local dev only (Portainer ignores this):
    # env_file:
    #   - .env
