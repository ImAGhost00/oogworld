services:
  oogworld:
    build: .
    container_name: oogworld
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # MediaMTX runs on the Windows Wall PC at 10.0.0.104; OogWorld proxies HLS from there.
      STREAM_URL_PRIMARY: ${STREAM_URL_PRIMARY:-http://10.0.0.104:8888/oogway-4k}
      STREAM_URL_SECONDARY: ${STREAM_URL_SECONDARY:-http://10.0.0.104:8888/oogway-1080}
      STREAM_LABEL_PRIMARY: ${STREAM_LABEL_PRIMARY:-Hut Cam}
      STREAM_LABEL_SECONDARY: ${STREAM_LABEL_SECONDARY:-Water Bowl Cam}
      STREAM_RESOLUTION_PRIMARY: ${STREAM_RESOLUTION_PRIMARY:-1080p}
      STREAM_RESOLUTION_SECONDARY: ${STREAM_RESOLUTION_SECONDARY:-720p}
      NTFY_TOPIC: ${NTFY_TOPIC:-your-unique-ntfy-topic}
      TZ: ${TZ:-America/New_York}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SUN_LAT: ${SUN_LAT:-40.7128}
      SUN_LNG: ${SUN_LNG:--74.0060}
      BEDTIME_SOON_MINUTES: ${BEDTIME_SOON_MINUTES:-90}
      ACTIVITY_LOG_PATH: ${ACTIVITY_LOG_PATH:-/app/activity_log.json}
      CHAT_LOG_PATH: ${CHAT_LOG_PATH:-/app/chat_log.json}
      OOGWAY_BRAIN_ENABLED: ${OOGWAY_BRAIN_ENABLED:-false}
      OOGWAY_BRAIN_NAME: ${OOGWAY_BRAIN_NAME:-Oogway}
      OOGWAY_OLLAMA_BASE: ${OOGWAY_OLLAMA_BASE:-http://ollama:11434}
      OOGWAY_OLLAMA_MODEL: ${OOGWAY_OLLAMA_MODEL:-llama3.1:8b}
      OOGWAY_OLLAMA_VISION_MODEL: ${OOGWAY_OLLAMA_VISION_MODEL:-llama3.2-vision:latest}
      OOGWAY_BRAIN_PERSONALITY: ${OOGWAY_BRAIN_PERSONALITY:-You are Oogway, a warm and observant tortoise who talks like a living terrarium companion.}
      OOGWAY_BRAIN_INTERVAL_SECONDS: ${OOGWAY_BRAIN_INTERVAL_SECONDS:-300}
      OOGWAY_BRAIN_MENTION_TRIGGER: ${OOGWAY_BRAIN_MENTION_TRIGGER:-@oogway}
      OOGWAY_BRAIN_CAMERA_KEY: ${OOGWAY_BRAIN_CAMERA_KEY:-both}
      OOGWAY_OBSIDIAN_VAULT_PATH: ${OOGWAY_OBSIDIAN_VAULT_PATH:-/app/obsidian}
      OOGWAY_OBSIDIAN_MEMORY_FOLDER: ${OOGWAY_OBSIDIAN_MEMORY_FOLDER:-Oogway Memory}
    volumes:
      - ${HOST_OBSIDIAN_VAULT_PATH:-./obsidian-vault}:/app/obsidian
    ports:
      - "4120:4120"
    restart: unless-stopped
    # For local dev only (Portainer ignores this):
    # env_file:
    #   - .env

  ollama:
    image: ollama/ollama:latest
    container_name: oogworld-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: oogworld-syncthing
    environment:
      PUID: ${SYNCTHING_PUID:-1000}
      PGID: ${SYNCTHING_PGID:-1000}
      TZ: ${TZ:-America/New_York}
    volumes:
      - syncthing_config:/config
      - ${HOST_OBSIDIAN_VAULT_PATH:-./obsidian-vault}:/sync/obsidian-vault
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    restart: unless-stopped

volumes:
  ollama_data:
  syncthing_config:
