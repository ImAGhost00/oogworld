<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OogWorld Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #000000;
      --card: #0d0d0d;
      --border: #1f1f1f;
      --accent: #39ff14;
      --text: #f5f5f5;
      --muted: #9ca3af;
      --danger: #ef4444;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
      background: radial-gradient(circle at 80% -10%, rgba(57, 255, 20, 0.12), transparent 35%), #000;
      color: var(--text);
    }

    .report-banner {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translate(-50%, -8px);
      z-index: 65;
      width: min(94vw, 780px);
      border: 1px solid rgba(239, 68, 68, 0.55);
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(127, 29, 29, 0.92), rgba(69, 10, 10, 0.9));
      box-shadow: 0 14px 34px rgba(127, 29, 29, 0.35);
      padding: 10px 14px;
      font-size: 13px;
      color: #fee2e2;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }

    .report-banner.show {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .panel {
      background: linear-gradient(160deg, rgba(18, 18, 18, 0.95), rgba(6, 6, 6, 0.98));
      border: 1px solid var(--border);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
    }

    .cog-btn {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid #2a2a2a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #d1d5db;
      background: rgba(255, 255, 255, 0.04);
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .cog-btn:hover {
      transform: rotate(35deg);
      background: rgba(255, 255, 255, 0.12);
    }

    .live-pulse {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--danger);
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.72);
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.72); }
      100% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
    }

    .chat-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(57, 255, 20, 0.45) transparent;
    }

    .chat-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .chat-scroll::-webkit-scrollbar-thumb {
      background: rgba(57, 255, 20, 0.45);
      border-radius: 12px;
    }

    .settings-modal {
      position: fixed;
      inset: 0;
      z-index: 70;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-modal.hidden {
      display: none;
    }

    .settings-panel {
      width: min(92vw, 390px);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px;
      background: linear-gradient(165deg, #121212, #090909);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.55);
    }

    .name-badge {
      border-radius: 999px;
      padding: 4px 12px;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.03em;
    }

    .swatch {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 2px solid transparent;
    }

    .swatch.selected {
      border-color: #fff;
    }

    .video-frame-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-bottom: 1px solid #1f1f1f;
    }

    .video-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: contain;
      background: #000;
    }

    .video-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #1f1f1f;
    }

    .v-btn {
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      color: #e5e7eb;
      background: rgba(255, 255, 255, 0.04);
    }

    .v-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .report-toggle-btn {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(248, 113, 113, 0.55);
      background: linear-gradient(135deg, rgba(220, 38, 38, 0.88), rgba(153, 27, 27, 0.88));
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.03em;
      padding: 10px 12px;
      text-transform: uppercase;
      font-size: 12px;
    }

    .report-panel {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      opacity: 1;
      max-height: 120px;
      transition: opacity 0.2s ease, max-height 0.24s ease;
    }

    .report-panel.hidden {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .report-btn {
      border-radius: 10px;
      border: 1px solid #3a3a3a;
      background: rgba(255, 255, 255, 0.05);
      color: #f3f4f6;
      font-size: 12px;
      font-weight: 700;
      padding: 10px 10px;
    }

    .report-btn.active {
      border-color: rgba(248, 113, 113, 0.9);
      background: rgba(220, 38, 38, 0.28);
      color: #fee2e2;
      box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.35) inset;
    }

    .live-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #3f1a1a;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      color: #fecaca;
      background: rgba(127, 29, 29, 0.22);
    }

    @media (max-width: 767px) {
      .mobile-sticky-video {
        position: sticky;
        top: 0;
        z-index: 20;
      }
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="report-banner" class="report-banner"></div>

  <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/85">
    <div class="panel w-full max-w-sm rounded-2xl p-8 text-center">
      <p class="text-xs uppercase tracking-[0.3em] text-lime-300/80">GhostWorld</p>
      <h1 class="mt-1 text-3xl font-bold">OogWorld Live</h1>
      <p class="mt-2 text-sm text-slate-400">Enter your username to join chat.</p>
      <input id="username-input" type="text" maxlength="24" autocomplete="off" placeholder="Username"
        class="mt-5 w-full rounded-xl border border-lime-500/30 bg-black/50 px-4 py-3 text-center outline-none focus:border-lime-400" />
      <button id="login-btn"
        class="mt-4 w-full rounded-xl bg-lime-500 py-3 text-sm font-bold uppercase tracking-wide text-black">Enter</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <main class="mx-auto max-w-7xl px-3 pb-24 pt-4 md:px-4 md:pb-8 md:pt-6">
      <header class="mb-3 flex items-center justify-between">
        <div>
          <p class="text-xs uppercase tracking-[0.3em] text-lime-300/80">GhostWorld</p>
          <h1 class="text-2xl font-bold md:text-3xl">OogWorld Stream + Chat</h1>
        </div>
        <div class="flex items-center gap-2">
          <span id="username-badge" class="name-badge"></span>
        </div>
      </header>

      <section class="grid gap-3 md:grid-cols-5">
        <article class="panel mobile-sticky-video overflow-hidden rounded-xl md:col-span-3">
          <div class="flex items-center justify-between border-b border-neutral-800 px-3 py-2">
            <div class="text-sm text-slate-200">MediaMTX WebRTC Stream</div>
            <div class="flex items-center gap-2">
              <span class="live-chip"><span class="live-pulse"></span> LIVE</span>
              <button id="video-settings-btn" class="cog-btn" title="Video settings">&#9881;</button>
            </div>
          </div>
          <div class="video-frame-wrap">
            <iframe id="webrtc-frame" src="" allow="autoplay; fullscreen" loading="lazy"></iframe>
          </div>
          <div class="video-controls">
            <button id="video-refresh-btn" class="v-btn">Reload Stream</button>
            <button id="video-popout-btn" class="v-btn">Open Player</button>
            <span class="ml-auto text-xs text-slate-400">Tunnel-safe stream routing enabled</span>
          </div>
        </article>

        <aside class="panel flex h-[68vh] min-h-[420px] flex-col overflow-hidden rounded-xl md:col-span-2">
          <div class="flex items-center justify-between border-b border-neutral-800 px-3 py-2">
            <div class="text-sm font-semibold text-slate-100">Live Chat</div>
            <button id="chat-settings-btn" class="cog-btn" title="Chat settings">&#9881;</button>
          </div>

          <div id="chat-messages" class="chat-scroll flex-1 overflow-y-auto px-3 py-2 text-sm"></div>

          <div class="border-t border-neutral-800 p-3">
            <button id="report-toggle-btn" class="report-toggle-btn">🚨 Emergency Report</button>
            <div id="report-panel" class="report-panel hidden">
              <button id="report-food-btn" class="report-btn">🍽️ Food Issue</button>
              <button id="report-water-btn" class="report-btn">💧 Water Issue</button>
            </div>
          </div>

          <div class="border-t border-neutral-800 p-2">
            <div class="flex gap-2">
              <input id="chat-input" type="text" maxlength="240" autocomplete="off" placeholder="Type a note..."
                class="w-full rounded-lg border border-lime-500/25 bg-black/50 px-3 py-2 text-sm outline-none focus:border-lime-400" />
              <button id="chat-send" class="rounded-lg bg-lime-500 px-3 py-2 text-sm font-bold text-black">Send</button>
            </div>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <div id="chat-settings-modal" class="settings-modal hidden">
    <div class="settings-panel">
      <div class="mb-3 flex items-center justify-between">
        <h2 class="text-base font-semibold">Chat Settings</h2>
        <button id="chat-settings-close" class="cog-btn" title="Close">&#10005;</button>
      </div>
      <label class="mb-1 block text-xs text-slate-400">Display Name</label>
      <input id="chat-name-input" type="text" maxlength="24" autocomplete="off"
        class="mb-3 w-full rounded-lg border border-lime-500/30 bg-black/50 px-3 py-2 text-sm outline-none focus:border-lime-400" />

      <label class="mb-1 block text-xs text-slate-400">Badge Color</label>
      <div id="chat-color-swatches" class="mb-3 flex flex-wrap gap-2"></div>

      <label class="mb-1 block text-xs text-slate-400">Chat Text Color</label>
      <div class="mb-4 flex gap-3 text-sm">
        <label class="inline-flex items-center gap-2">
          <input type="radio" name="chatTextColor" value="white" checked class="accent-lime-400" />
          <span>White</span>
        </label>
        <label class="inline-flex items-center gap-2">
          <input type="radio" name="chatTextColor" value="black" class="accent-lime-400" />
          <span>Black</span>
        </label>
      </div>

      <button id="chat-settings-save" class="w-full rounded-lg bg-lime-500 py-2 text-sm font-bold text-black">Save</button>
    </div>
  </div>

  <div id="video-settings-modal" class="settings-modal hidden">
    <div class="settings-panel">
      <div class="mb-3 flex items-center justify-between">
        <h2 class="text-base font-semibold">Video Settings</h2>
        <button id="video-settings-close" class="cog-btn" title="Close">&#10005;</button>
      </div>

      <label class="mb-1 block text-xs text-slate-400">Autoplay on load</label>
      <label class="mb-3 inline-flex items-center gap-2 text-sm">
        <input id="video-autoplay" type="checkbox" class="accent-lime-400" />
        <span>Enabled</span>
      </label>

      <label class="mb-1 block text-xs text-slate-400">Reload on reconnect</label>
      <label class="mb-3 inline-flex items-center gap-2 text-sm">
        <input id="video-auto-reload" type="checkbox" class="accent-lime-400" />
        <span>Enabled</span>
      </label>

      <p class="mb-4 text-xs text-slate-400">WebRTC-only mode is active for reliability.</p>

      <button id="video-settings-save" class="w-full rounded-lg bg-lime-500 py-2 text-sm font-bold text-black">Save</button>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var CHAT_RETRY_MS = 2500;
      var COLOR_OPTIONS = ["#39ff14", "#22d3ee", "#60a5fa", "#a78bfa", "#f472b6", "#fb923c", "#facc15", "#ffffff", "#94a3b8"];

      var state = {
        username: sessionStorage.getItem("oogworld_username") || "",
        badgeColor: sessionStorage.getItem("oogworld_badge_color") || "#39ff14",
        chatTextColor: sessionStorage.getItem("oogworld_chat_text_color") || "white",
        streams: {},
        ws: null,
        seenMessageIds: {},
        reports: {
          food: { active: false, reporter: "" },
          water: { active: false, reporter: "" },
        },
      };

      var videoPrefs = JSON.parse(localStorage.getItem("oogworld_video_prefs") || "{}");
      videoPrefs.autoplay = videoPrefs.autoplay !== false;
      videoPrefs.autoReload = videoPrefs.autoReload !== false;

      var el = {
        app: document.getElementById("app"),
        loginOverlay: document.getElementById("login-overlay"),
        usernameInput: document.getElementById("username-input"),
        loginBtn: document.getElementById("login-btn"),
        usernameBadge: document.getElementById("username-badge"),
        webrtcFrame: document.getElementById("webrtc-frame"),
        reportBanner: document.getElementById("report-banner"),
        chatMessages: document.getElementById("chat-messages"),
        chatInput: document.getElementById("chat-input"),
        chatSend: document.getElementById("chat-send"),
        reportToggleBtn: document.getElementById("report-toggle-btn"),
        reportPanel: document.getElementById("report-panel"),
        reportFoodBtn: document.getElementById("report-food-btn"),
        reportWaterBtn: document.getElementById("report-water-btn"),
        videoRefreshBtn: document.getElementById("video-refresh-btn"),
        videoPopoutBtn: document.getElementById("video-popout-btn"),
        chatSettingsBtn: document.getElementById("chat-settings-btn"),
        chatSettingsClose: document.getElementById("chat-settings-close"),
        chatSettingsSave: document.getElementById("chat-settings-save"),
        chatSettingsModal: document.getElementById("chat-settings-modal"),
        chatNameInput: document.getElementById("chat-name-input"),
        chatColorSwatches: document.getElementById("chat-color-swatches"),
        videoSettingsBtn: document.getElementById("video-settings-btn"),
        videoSettingsClose: document.getElementById("video-settings-close"),
        videoSettingsSave: document.getElementById("video-settings-save"),
        videoSettingsModal: document.getElementById("video-settings-modal"),
        videoAutoplay: document.getElementById("video-autoplay"),
        videoAutoReload: document.getElementById("video-auto-reload"),
      };

      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function isLightColor(hex) {
        var h = (hex || "").replace("#", "");
        if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
        var r = parseInt(h.substring(0, 2), 16) || 0;
        var g = parseInt(h.substring(2, 4), 16) || 0;
        var b = parseInt(h.substring(4, 6), 16) || 0;
        return (r * 0.299 + g * 0.587 + b * 0.114) > 160;
      }

      function applyBadge() {
        el.usernameBadge.textContent = state.username;
        el.usernameBadge.style.background = state.badgeColor;
        el.usernameBadge.style.color = isLightColor(state.badgeColor) ? "#050505" : "#ffffff";
        el.usernameBadge.style.boxShadow = "0 0 0 2px rgba(0,0,0,.35), 0 4px 12px " + state.badgeColor + "66";
      }

      function appendChatMessage(msg) {
        if (msg.id && state.seenMessageIds[msg.id]) return;
        if (msg.id) state.seenMessageIds[msg.id] = true;

        var row = document.createElement("div");
        row.className = "mb-1 leading-snug";

        var dt = msg.ts ? new Date(msg.ts) : new Date();
        var time = dt.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        var msgTextColor = msg.textColor === "black" ? "#111111" : "#ffffff";
        var msgTextBg = msg.textColor === "black" ? "background: #f5f5f5; padding: 0 4px; border-radius: 4px;" : "";

        var kindBadge = msg.kind === "action" ? "<span class=\"mr-1 rounded bg-emerald-600/30 px-1.5 py-0.5 text-[10px] text-emerald-200\">ACTION</span>" : "";
        row.innerHTML =
          "<span class=\"text-[11px] text-slate-500\">[" + escHtml(time) + "]</span> " +
          kindBadge +
          "<span class=\"font-semibold\" style=\"color:" + escHtml(msg.usernameColor || "#a3e635") + "\">" + escHtml(msg.username || "Anonymous") + "</span>: " +
          "<span style=\"color:" + msgTextColor + "; " + msgTextBg + "\">" + escHtml(msg.text || "") + "</span>";

        el.chatMessages.appendChild(row);
        el.chatMessages.scrollTop = el.chatMessages.scrollHeight;

        if (msg.kind === "report") {
          loadReports();
        }
      }

      async function loadHealth() {
        try {
          var r = await fetch("/api/health");
          if (!r.ok) return null;
          return await r.json();
        } catch (e) {
          return null;
        }
      }

      function setWebRtcSource(forceReload) {
        var src = state.streams.webrtc || "";
        if (!src) return;

        if (!videoPrefs.autoplay) {
          src += (src.indexOf("?") === -1 ? "?" : "&") + "autoplay=0";
        }

        if (forceReload || el.webrtcFrame.src !== src) {
          el.webrtcFrame.src = src;
        }
      }

      function connectChat() {
        var proto = location.protocol === "https:" ? "wss" : "ws";
        var qs = "?username=" + encodeURIComponent(state.username) +
          "&textColor=" + encodeURIComponent(state.chatTextColor) +
          "&usernameColor=" + encodeURIComponent(state.badgeColor);
        state.ws = new WebSocket(proto + "://" + location.host + "/ws/chat" + qs);

        state.ws.onmessage = function (evt) {
          try {
            appendChatMessage(JSON.parse(evt.data));
          } catch (e) {
            // ignore malformed messages
          }
        };

        state.ws.onclose = function () {
          setTimeout(function () {
            connectChat();
            if (videoPrefs.autoReload) setWebRtcSource(true);
          }, CHAT_RETRY_MS);
        };
      }

      function sendChat() {
        var text = el.chatInput.value.trim();
        if (!text || !state.ws || state.ws.readyState !== WebSocket.OPEN) return;
        state.ws.send(text);
        el.chatInput.value = "";
      }

      async function loadReports() {
        try {
          var resp = await fetch("/api/reports");
          if (!resp.ok) return;
          var payload = await resp.json();
          if (payload && payload.items) {
            state.reports = payload.items;
            renderReports();
          }
        } catch (e) {
          // keep current state on transient failure
        }
      }

      function renderReports() {
        var foodActive = !!(state.reports.food && state.reports.food.active);
        var waterActive = !!(state.reports.water && state.reports.water.active);

        el.reportFoodBtn.classList.toggle("active", foodActive);
        el.reportWaterBtn.classList.toggle("active", waterActive);
        el.reportFoodBtn.textContent = (foodActive ? "✅ " : "🍽️ ") + "Food Issue";
        el.reportWaterBtn.textContent = (waterActive ? "✅ " : "💧 ") + "Water Issue";

        var lines = [];
        if (foodActive) {
          var byFood = state.reports.food.reporter || "Someone";
          lines.push("🍽️ " + byFood + " reported Oogway is out of food");
        }
        if (waterActive) {
          var byWater = state.reports.water.reporter || "Someone";
          lines.push("💧 " + byWater + " reported Oogway is out of water");
        }

        if (lines.length) {
          el.reportBanner.textContent = "🚨 " + lines.join(" | ");
          el.reportBanner.classList.add("show");
        } else {
          el.reportBanner.classList.remove("show");
          setTimeout(function () {
            if (!el.reportBanner.classList.contains("show")) {
              el.reportBanner.textContent = "";
            }
          }, 320);
        }
      }

      async function toggleReport(kind) {
        var curr = !!(state.reports[kind] && state.reports[kind].active);
        var next = !curr;
        try {
          var resp = await fetch("/api/reports/toggle", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              kind: kind,
              active: next,
              username: state.username,
            }),
          });
          if (!resp.ok) {
            var payload = await resp.json().catch(function () { return { detail: "Report request failed" }; });
            alert(payload.detail || "Report request failed");
            return;
          }
          await loadReports();
        } catch (e) {
          alert("Network error while sending report");
        }
      }

      function buildColorSwatches(selected) {
        el.chatColorSwatches.innerHTML = "";
        COLOR_OPTIONS.forEach(function (color) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "swatch" + (color === selected ? " selected" : "");
          btn.style.background = color;
          btn.title = color;
          btn.addEventListener("click", function () {
            state.badgeColor = color;
            buildColorSwatches(color);
          });
          el.chatColorSwatches.appendChild(btn);
        });
      }

      function openChatSettings() {
        el.chatNameInput.value = state.username;
        var radios = document.querySelectorAll('input[name="chatTextColor"]');
        radios.forEach(function (r) {
          r.checked = r.value === state.chatTextColor;
        });
        buildColorSwatches(state.badgeColor);
        el.chatSettingsModal.classList.remove("hidden");
      }

      function closeChatSettings() {
        el.chatSettingsModal.classList.add("hidden");
      }

      function saveChatSettings() {
        state.username = (el.chatNameInput.value || "").trim().replace(/[<>]/g, "").slice(0, 24) || "Anonymous";
        var selectedColor = "white";
        var radios = document.querySelectorAll('input[name="chatTextColor"]');
        radios.forEach(function (r) {
          if (r.checked) selectedColor = r.value;
        });
        state.chatTextColor = selectedColor === "black" ? "black" : "white";

        sessionStorage.setItem("oogworld_username", state.username);
        sessionStorage.setItem("oogworld_badge_color", state.badgeColor);
        sessionStorage.setItem("oogworld_chat_text_color", state.chatTextColor);

        applyBadge();
        closeChatSettings();

        if (state.ws) {
          state.ws.onclose = null;
          state.ws.close();
        }
        connectChat();
      }

      function openVideoSettings() {
        el.videoAutoplay.checked = videoPrefs.autoplay;
        el.videoAutoReload.checked = videoPrefs.autoReload;
        el.videoSettingsModal.classList.remove("hidden");
      }

      function closeVideoSettings() {
        el.videoSettingsModal.classList.add("hidden");
      }

      function saveVideoSettings() {
        videoPrefs.autoplay = !!el.videoAutoplay.checked;
        videoPrefs.autoReload = !!el.videoAutoReload.checked;
        localStorage.setItem("oogworld_video_prefs", JSON.stringify(videoPrefs));
        closeVideoSettings();
        setWebRtcSource(true);
      }

      function openPlayerTab() {
        var url = state.streams.webrtcDirect || state.streams.webrtc || "";
        if (!url) return;
        window.open(url, "_blank", "noopener,noreferrer");
      }

      function doLogin() {
        var input = (el.usernameInput.value || "").trim();
        if (!input) return;
        state.username = input.replace(/[<>]/g, "").slice(0, 24) || "Anonymous";
        sessionStorage.setItem("oogworld_username", state.username);
        el.loginOverlay.classList.add("hidden");
        el.app.classList.remove("hidden");
        bootstrap();
      }

      async function bootstrap() {
        applyBadge();

        var health = await loadHealth();
        if (!health || !health.streams || !health.streams.webrtc) {
          alert("WebRTC stream not configured. Check STREAM_URL.");
          return;
        }
        state.streams = health.streams;
        setWebRtcSource(true);
        connectChat();
        await loadReports();
        setInterval(loadReports, 15000);
      }

      el.loginBtn.addEventListener("click", doLogin);
      el.usernameInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") doLogin();
      });

      el.chatSend.addEventListener("click", sendChat);
      el.chatInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") sendChat();
      });

      el.reportToggleBtn.addEventListener("click", function () {
        el.reportPanel.classList.toggle("hidden");
      });
      el.reportFoodBtn.addEventListener("click", function () {
        toggleReport("food");
      });
      el.reportWaterBtn.addEventListener("click", function () {
        toggleReport("water");
      });

      el.videoRefreshBtn.addEventListener("click", function () {
        setWebRtcSource(true);
      });
      el.videoPopoutBtn.addEventListener("click", openPlayerTab);

      el.chatSettingsBtn.addEventListener("click", openChatSettings);
      el.chatSettingsClose.addEventListener("click", closeChatSettings);
      el.chatSettingsSave.addEventListener("click", saveChatSettings);
      el.chatSettingsModal.addEventListener("click", function (e) {
        if (e.target === el.chatSettingsModal) closeChatSettings();
      });

      el.videoSettingsBtn.addEventListener("click", openVideoSettings);
      el.videoSettingsClose.addEventListener("click", closeVideoSettings);
      el.videoSettingsSave.addEventListener("click", saveVideoSettings);
      el.videoSettingsModal.addEventListener("click", function (e) {
        if (e.target === el.videoSettingsModal) closeVideoSettings();
      });

      if (state.username) {
        el.loginOverlay.classList.add("hidden");
        el.app.classList.remove("hidden");
        bootstrap();
      }
    }());
  </script>
</body>
</html>
