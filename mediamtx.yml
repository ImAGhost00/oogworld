logLevel: info
logDestinations: [stdout]

api: true
rtsp: true
hls: true
webrtc: false

# Changed from "optional" (string) to false (bool) to satisfy the Go parser
webrtcEncryption: false
webrtcAllowOrigin: "*"

hlsAlwaysRemux: true
hlsVariant: mpegts
hlsSegmentCount: 6
hlsSegmentDuration: 1s
hlsAllowOrigin: "*"

paths:
  oogway:
    source: publisher
    runOnInit: ffmpeg -f dshow -rtbufsize 128M -i video="c922 Pro Stream Webcam" -vcodec h264_qsv -profile:v high -bf 0 -r 30 -g 60 -keyint_min 60 -sc_threshold 0 -s 1920x1080 -b:v 3500k -maxrate 4000k -bufsize 7000k -preset fast -f rtsp -rtsp_transport tcp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: true