logLevel: info
logDestinations: [stdout]

api: true
rtsp: true
hls: true
webrtc: false

# Changed from "optional" (string) to false (bool) to satisfy the Go parser
webrtcEncryption: false
webrtcAllowOrigin: "*"

hlsAlwaysRemux: true
hlsVariant: mpegts
hlsSegmentCount: 6
hlsSegmentDuration: 1s
hlsAllowOrigin: "*"

paths:
  oogway:
    source: publisher